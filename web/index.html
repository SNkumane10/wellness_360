<!DOCTYPE html>
<html>

<head>
  <!-- Base path (managed by Flutter build) -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- Primary SEO meta (will be overridden dynamically by Flutter) -->
  <meta name="description" content="Wellness360 – Doctor-led metabolic health and lifestyle medicine platform.">

  <!-- Mobile / PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Wellness360">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- App title (fallback only; Flutter will override) -->
  <title>Wellness360</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- 🔍 Force HTML renderer for crawlers (seo_renderer requirement) -->
  <script>
    const regExp = new RegExp("bot|google|baidu|bing|msn|teoma|slurp|yandex", "i");
    if (regExp.test(navigator.userAgent)) {
      window.flutterWebRenderer = "html";
    }
  </script>
</head>

<body>
  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
